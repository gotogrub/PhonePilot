services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    network_mode: host
    environment:
      - PHONEPILOT_DEBUG=true
      - PHONEPILOT_REDIS_URL=redis://127.0.0.1:6379/0
      - PHONEPILOT_OLLAMA_BASE_URL=http://127.0.0.1:11434
      - PHONEPILOT_ADB_HOST=127.0.0.1
      - PHONEPILOT_ADB_PORT=5037
    volumes:
      - ./backend:/app
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
