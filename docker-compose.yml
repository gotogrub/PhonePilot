services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PHONEPILOT_REDIS_URL=redis://redis:6379/0
      - PHONEPILOT_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - PHONEPILOT_DATABASE_URL=sqlite+aiosqlite:///./data/phonepilot.db
      - PHONEPILOT_ADB_HOST=host.docker.internal
      - PHONEPILOT_ADB_PORT=5037
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
