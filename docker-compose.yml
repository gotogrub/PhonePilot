services:
  backend:
    build: ./backend
    network_mode: host
    environment:
      - PHONEPILOT_REDIS_URL=redis://127.0.0.1:6379/0
      - PHONEPILOT_OLLAMA_BASE_URL=http://127.0.0.1:11434
      - PHONEPILOT_DATABASE_URL=sqlite+aiosqlite:///./data/phonepilot.db
      - PHONEPILOT_ADB_HOST=127.0.0.1
      - PHONEPILOT_ADB_PORT=5037
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
